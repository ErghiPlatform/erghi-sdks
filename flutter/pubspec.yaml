name: erghi_sdk
description: Official Erghi SDK for Flutter - Real-time customer support chat in your iOS and Android apps
version: 1.0.0
homepage: https://github.com/ErghiPlatform/erghi-sdks
repository: https://github.com/ErghiPlatform/erghi-sdks

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  
  # HTTP & WebSocket
  http: ^1.2.0
  web_socket_channel: ^3.0.1
  
  # JSON Serialization
  json_annotation: ^4.9.0
  
  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.7
  
  # Storage
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.2.2
  
  # Utilities
  rxdart: ^0.28.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  json_serializable: ^6.9.0
  mockito: ^5.4.4

flutter:
  uses-material-design: true
