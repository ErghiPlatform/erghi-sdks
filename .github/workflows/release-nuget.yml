name: Release NuGet package

# Publishes Erghi.SDK to nuget.org via Trusted Publishing (OIDC) - nuget.org
# is configured (Package owner: erghi.ai, Publisher: GitHubActions,
# Repository: ErghiPlatform/Erghi-sdks, Workflow: release-nuget.yml) to trade
# this workflow's GitHub-issued OIDC token for a short-lived (~1hr) NuGet API
# key, so no long-lived NUGET_API_KEY secret is stored or rotated.
# Trigger manually or by pushing a tag: dotnet-v1.0.0

on:
  workflow_dispatch:
  push:
    tags:
      - 'dotnet-v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: ./dotnet
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Erghi.SDK/Erghi.SDK.csproj

      - name: Test
        run: dotnet test tests/Erghi.SDK.Tests/Erghi.SDK.Tests.csproj --configuration Release --verbosity normal

      - name: Pack
        run: dotnet pack Erghi.SDK/Erghi.SDK.csproj --configuration Release --output ./nupkg

      - name: NuGet login (OIDC -> short-lived API key)
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: erghi.ai

      - name: Push to nuget.org
        run: dotnet nuget push ./nupkg/*.nupkg --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
