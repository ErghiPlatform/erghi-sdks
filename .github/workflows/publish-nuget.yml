name: CI .NET

on:
  push:
    branches: [main, develop]
    paths:
      - 'dotnet/**'
      - '.github/workflows/publish-nuget.yml'
  pull_request:
    branches: [main]
    paths:
      - 'dotnet/**'
      - '.github/workflows/publish-nuget.yml'
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./dotnet
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      
      - name: Restore dependencies
        run: dotnet restore AIChatSDK/AIChatSDK.csproj
      
      - name: Build
        run: dotnet build AIChatSDK/AIChatSDK.csproj --configuration Release --no-restore
      
      - name: Test
        run: dotnet test AIChatSDK/AIChatSDK.csproj --configuration Release --no-build --verbosity normal
