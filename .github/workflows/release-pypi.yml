name: Release PyPI package

# Publishes erghi-sdk to PyPI.
# Trigger manually or by pushing a tag: python-v1.0.0
# Requires the PYPI_API_TOKEN repository secret (PyPI API token scoped to the
# erghi-sdk project, or an account-wide token for the first publish).
#
# Until PYPI_API_TOKEN is set, this job will fail at the `twine upload` step
# with a clear auth error rather than silently no-op -- that's intentional,
# it's the signal that credentials still need to be added.

on:
  workflow_dispatch:
  push:
    tags:
      - 'python-v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./python
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine
          pip install .[dev]

      - name: Run tests
        run: |
          if [ -d "tests" ]; then
            pytest tests/ -v
          fi

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        run: twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
