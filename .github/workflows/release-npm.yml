name: Release npm packages

# Publishes @erghi/sdk, @erghi/widget, @erghi/react, and/or @erghi/angular to
# npm with provenance. Trigger manually (choose which package) or by pushing
# a tag:
#   sdk-v1.0.0     → publishes @erghi/sdk
#   widget-v1.0.0  → publishes @erghi/widget
#   react-v1.0.0   → publishes @erghi/react
#   angular-v1.0.0 → publishes @erghi/angular
# Requires the NPM_TOKEN repository secret (granular token, publish rights on @erghi).

on:
  workflow_dispatch:
    inputs:
      package:
        description: Which package to publish
        required: true
        type: choice
        options: [sdk, widget, react, angular, all]
  push:
    tags:
      - 'sdk-v*'
      - 'widget-v*'
      - 'react-v*'
      - 'angular-v*'

permissions:
  contents: read
  id-token: write # npm provenance attestation

jobs:
  publish-sdk:
    if: >-
      (github.event_name == 'workflow_dispatch' && (inputs.package == 'sdk' || inputs.package == 'all')) ||
      startsWith(github.ref_name, 'sdk-v')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./javascript
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npx vitest run --passWithNoTests

      - name: Publish @erghi/sdk
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-widget:
    if: >-
      (github.event_name == 'workflow_dispatch' && (inputs.package == 'widget' || inputs.package == 'all')) ||
      startsWith(github.ref_name, 'widget-v')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./widget
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npx jest

      - name: Build
        run: npm run build

      - name: Publish @erghi/widget
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-react:
    if: >-
      (github.event_name == 'workflow_dispatch' && (inputs.package == 'react' || inputs.package == 'all')) ||
      startsWith(github.ref_name, 'react-v')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./react
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      # @erghi/react depends on @erghi/sdk as a local file: reference -- build it first.
      - name: Build local @erghi/sdk dependency
        run: |
          cd ../javascript
          npm install
          npm run build
          cd ../react

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npx vitest run --passWithNoTests

      - name: Build
        run: npm run build

      - name: Publish @erghi/react
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-angular:
    if: >-
      (github.event_name == 'workflow_dispatch' && (inputs.package == 'angular' || inputs.package == 'all')) ||
      startsWith(github.ref_name, 'angular-v')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./angular
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test -- --browsers=ChromeHeadlessNoSandbox

      - name: Build
        run: npm run build

      # ng-packagr builds the publishable package into ./dist (its own
      # package.json lives there, distinct from the source root's).
      - name: Publish @erghi/angular
        working-directory: ./angular/dist
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
