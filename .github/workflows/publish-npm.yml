name: CI NPM

on:
  push:
    branches: [main, develop]
    paths:
      - 'javascript/**'
      - 'react/**'
      - 'angular/**'
      - '.github/workflows/publish-npm.yml'
  pull_request:
    branches: [main]
    paths:
      - 'javascript/**'
      - 'react/**'
      - 'angular/**'
      - '.github/workflows/publish-npm.yml'
  workflow_dispatch:

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      javascript: ${{ steps.filter.outputs.javascript }}
      react: ${{ steps.filter.outputs.react }}
      angular: ${{ steps.filter.outputs.angular }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            javascript:
              - 'javascript/**'
            react:
              - 'react/**'
            angular:
              - 'angular/**'

  check-javascript:
    needs: detect-changes
    if: needs.detect-changes.outputs.javascript == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./javascript
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      
      - name: Install dependencies
        run: npm install
      
      - name: Run tests
        run: npx vitest run --passWithNoTests
      
      - name: Build
        run: npm run build

  check-react:
    needs: [detect-changes, check-javascript]
    if: needs.detect-changes.outputs.react == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./react
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      
      # Build the javascript SDK dependency first since React SDK references it locally
      - name: Build local JavaScript SDK dependency
        run: |
          cd ../javascript
          npm install
          npm run build
          cd ../react
      
      - name: Install dependencies
        run: npm install
      
      - name: Run tests
        run: npx vitest run --passWithNoTests
      
      - name: Build
        run: npm run build

  check-angular:
    needs: detect-changes
    if: needs.detect-changes.outputs.angular == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./angular
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      
      - name: Install dependencies
        run: npm install
      
      - name: Run tests
        run: npm test -- --browsers=ChromeHeadlessNoSandbox
      
      - name: Build
        run: npm run build
