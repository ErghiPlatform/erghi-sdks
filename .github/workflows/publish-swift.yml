name: CI Swift

on:
  push:
    branches: [main, develop]
    paths:
      - 'swift/**'
      - '.github/workflows/publish-swift.yml'
  pull_request:
    branches: [main]
    paths:
      - 'swift/**'
      - '.github/workflows/publish-swift.yml'
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: ./swift
    steps:
      - uses: actions/checkout@v4
      
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app
      
      - name: Build
        run: swift build
      
      - name: Run tests
        run: |
          if [ -d "Tests" ]; then
            swift test
          else
            echo "No Tests directory found, skipping swift test."
          fi
      
      # Note: Swift packages are published via GitHub releases and Package.swift
      # The package is available automatically via SPM once tagged
