name: CI Flutter

on:
  push:
    branches: [main, develop]
    paths:
      - 'flutter/**'
      - '.github/workflows/publish-flutter.yml'
  pull_request:
    branches: [main]
    paths:
      - 'flutter/**'
      - '.github/workflows/publish-flutter.yml'
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./flutter
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Analyze
        run: flutter analyze
      
      - name: Run tests
        run: |
          if [ -d "test" ]; then
            flutter test
          else
            echo "No test directory found, skipping flutter test."
          fi
