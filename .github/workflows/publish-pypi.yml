name: CI Python

on:
  push:
    branches: [main, develop]
    paths:
      - 'python/**'
      - '.github/workflows/publish-pypi.yml'
  pull_request:
    branches: [main]
    paths:
      - 'python/**'
      - '.github/workflows/publish-pypi.yml'
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./python
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine
          pip install -r requirements-dev.txt || pip install pytest pytest-asyncio pytest-cov black ruff mypy
      
      - name: Run tests
        run: |
          if [ -d "tests" ]; then
            pytest tests/ -v --cov=aichat --cov-report=term-missing
          else
            echo "No tests directory found, skipping pytest."
          fi
      
      - name: Lint
        run: |
          black --check aichat/ || (black --diff aichat/ && exit 1)
          ruff check aichat/
          mypy aichat/
      
      - name: Build package
        run: python -m build
